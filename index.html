<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeAssist — Presentations</title>
<meta name="description" content="Index of WeAssist presentations and strategy decks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── ONE token block re-skins the whole index (matches the decks) ── */
  :root {
    --bg-deep: #faf9f6;
    --bg-card: #ffffff;
    --bg-card-alt: #f3f3ee;
    --border: #e5e4da;
    --border-light: #c8c7b8;
    --text-primary: #1c1c1a;
    --text-secondary: #3d3d3a;
    --text-muted: #7c7b72;
    --accent: #2c3e50;
    --accent-soft: #34495e;
    --accent-glow: rgba(44, 62, 80, 0.05);
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --transition-smooth: 0.25s ease-in-out;
    --transition-present: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-display: 'Outfit', 'Inter', -apple-system, sans-serif;
    --maxw: 880px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-sans);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    padding: clamp(1.25rem, 5vw, 4rem) 1.25rem;
    min-height: 100vh;
  }
  .wrap { max-width: var(--maxw); margin: 0 auto; }
  header { margin-bottom: clamp(1.75rem, 5vw, 3rem); border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
  .eyebrow {
    font-family: var(--font-display);
    font-size: clamp(0.7rem, 2vw, 0.8rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 0.6rem;
  }
  h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
    color: var(--text-primary);
  }
  .sub { color: var(--text-muted); margin-top: 0.6rem; font-size: clamp(0.9rem, 2.5vw, 1.05rem); }
  .grid { display: grid; gap: clamp(0.85rem, 2.5vw, 1.1rem); }
  a.card {
    display: block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: clamp(1.1rem, 3.5vw, 1.6rem);
    text-decoration: none;
    color: inherit;
    transition: transform var(--transition-present), border-color var(--transition-smooth), box-shadow var(--transition-smooth);
    box-shadow: 0 1px 2px rgba(28,28,26,0.03);
  }
  a.card:hover, a.card:focus-visible {
    transform: translateY(-2px);
    border-color: var(--border-light);
    box-shadow: 0 6px 22px rgba(28,28,26,0.07);
    outline: none;
  }
  .card-top { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
  .card h2 {
    font-family: var(--font-display);
    font-size: clamp(1.1rem, 3.5vw, 1.4rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text-primary);
  }
  .date { font-size: 0.82rem; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .card p { color: var(--text-secondary); margin-top: 0.5rem; font-size: clamp(0.88rem, 2.5vw, 0.98rem); }
  .tags { margin-top: 0.85rem; display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag {
    font-size: 0.72rem;
    letter-spacing: 0.02em;
    color: var(--accent-soft);
    background: var(--accent-glow);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.2rem 0.55rem;
    font-weight: 500;
  }
  .empty, .error { color: var(--text-muted); padding: 2rem 0; font-size: 0.95rem; }
  .error code { background: var(--bg-card-alt); padding: 0.1rem 0.35rem; border-radius: var(--radius-sm); }
  footer { margin-top: clamp(2rem, 6vw, 3.5rem); padding-top: 1.25rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; }
  @media (prefers-reduced-motion: reduce) { a.card { transition: none; } a.card:hover { transform: none; } }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">WeAssist</div>
      <h1>Presentations</h1>
      <p class="sub">Strategy decks &amp; recaps. Each opens as a standalone, shareable slideshow.</p>
    </header>
    <main id="list" class="grid" aria-live="polite">
      <p class="empty">Loading presentations…</p>
    </main>
    <footer>
      <span id="count"></span> &middot; Add a deck by dropping <code>decks/&lt;slug&gt;/index.html</code> and an entry in <code>presentations.json</code>.
    </footer>
  </div>

<script>
  // Dynamic, data-driven TOC. Source of truth = presentations.json.
  // No deck is hand-coded here; adding one never touches this file.
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
  const fmtDate = (iso) => {
    if (!iso) return "";
    const d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return esc(iso);
    return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
  };
  function render(decks) {
    const list = document.getElementById("list");
    if (!Array.isArray(decks) || decks.length === 0) {
      list.innerHTML = '<p class="empty">No presentations yet.</p>';
      return;
    }
    list.innerHTML = decks.map(d => {
      const href = "decks/" + encodeURIComponent(d.slug) + "/";
      const tags = (d.tags || []).map(t => '<span class="tag">' + esc(t) + "</span>").join("");
      return (
        '<a class="card" href="' + href + '">' +
          '<div class="card-top">' +
            "<h2>" + esc(d.title || d.slug) + "</h2>" +
            '<span class="date">' + fmtDate(d.date) + "</span>" +
          "</div>" +
          (d.summary ? "<p>" + esc(d.summary) + "</p>" : "") +
          (tags ? '<div class="tags">' + tags + "</div>" : "") +
        "</a>"
      );
    }).join("");
    document.getElementById("count").textContent =
      decks.length + " presentation" + (decks.length === 1 ? "" : "s");
  }
  fetch("presentations.json", { cache: "no-cache" })
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(data => render(data.decks || []))
    .catch(err => {
      document.getElementById("list").innerHTML =
        '<p class="error">Could not load <code>presentations.json</code> (' + esc(err.message) +
        "). The decks are still reachable directly under <code>decks/&lt;slug&gt;/</code>.</p>";
    });
</script>
</body>
</html>
